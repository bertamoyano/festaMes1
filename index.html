<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡T'han convidat a la festa del +1! ✨</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000; /* Color de seguridad */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; /* Evita que el body escandale */
        }

        /* ----- TU FONDO GLITTER (Directo, sin overlay ni opacidad) ----- */
        .glitter-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            /* Ajusta la extensión si tu fondo es .png */
            background-image: url('img/fondo.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        .main-container {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; width: 100%;
        }

        /* ----- EL SOBRE ----- */
        #sobre-box {
            cursor: pointer;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .sobre-img {
            width: 75vw;
            max-width: 350px;
            height: auto;
            animation: bounce 2s infinite ease-in-out;
        }

        .texto-click {
            color: white; margin-top: 25px;
            font-weight: bold; font-size: 1.3em;
            letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4;
        }

        /* ----- INVITACIÓN DE CANVA (PNG CON SCROLL) ----- */
        #invitacion-canva {
            display: none;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100; /* Tapa el sobre y el glitter */
            background-color: #fff; /* Fondo blanco para la invitación */
            overflow-y: auto; /* Permite scroll vertical */
            -webkit-overflow-scrolling: touch;
        }

        #invitacion-canva img {
            width: 100%;
            height: auto; /* Fundamental para que el scroll funcione */
            display: block;
        }

        /* Animaciones */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .fade-out { 
            opacity: 0; 
            transform: scale(0.5) rotate(15deg); 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div class="glitter-bg"></div>

    <div class="main-container">
        <div id="sobre-box" onclick="abrirInvitacion()">
            <img src="img/sobre.png" alt="Sobre" class="sobre-img">
            <div class="texto-click">CLICA AQUÍ</div>
        </div>
    </div>

    <div id="invitacion-canva">
        <img src="img/invitacion.png" alt="Invitación de la Fiesta">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <script>
        function abrirInvitacion() {
            const sobre = document.getElementById('sobre-box');
            sobre.classList.add('fade-out');

            setTimeout(() => {
                const invitacion = document.getElementById('invitacion-canva');
                invitacion.style.display = 'block';
                
                // Confeti al abrir
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#ff69b4', '#ffee00', '#00ff00', '#00e5ff', '#ffffff']
                });
            }, 600);
        }
    </script>
</body>
</html>
